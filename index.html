<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>家庭点菜</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif; background: #f0f2f5; color: #333; min-height: 100vh; }
.header { background: linear-gradient(135deg, #ff6b35, #f7931e); color: #fff; text-align: center; padding: 16px 16px 10px; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 12px rgba(255,107,53,0.3); }
.header h1 { font-size: 20px; font-weight: 700; margin-bottom: 6px; }
.header .sub { font-size: 12px; opacity: 0.85; }

/* 角色切换标签 */
.role-tabs { display: flex; gap: 0; margin: 8px 12px 0; background: #e8e8e8; border-radius: 10px; padding: 3px; }
.role-tab { flex: 1; padding: 8px 0; text-align: center; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.25s; border: none; background: transparent; color: #888; }
.role-tab.active { background: #fff; color: #333; box-shadow: 0 1px 4px rgba(0,0,0,0.1); }
.role-tab.cook.active { background: #27ae60; color: #fff; }

/* 模式切换标签 */
.mode-tabs { display: flex; gap: 0; margin: 8px 12px 0; background: #e8e8e8; border-radius: 10px; padding: 3px; }
.mode-tab { flex: 1; padding: 10px 0; text-align: center; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.25s; border: none; background: transparent; color: #888; }
.mode-tab.active { background: #fff; color: #333; box-shadow: 0 1px 4px rgba(0,0,0,0.1); }
.mode-tab.diet { position: relative; }
.mode-tab.diet .badge { position: absolute; top: -4px; right: 4px; background: #27ae60; color: #fff; font-size: 10px; padding: 1px 6px; border-radius: 8px; font-weight: 500; }

/* 健康提醒开关 */
.health-bar { display: flex; gap: 8px; margin: 8px 12px 0; }
.health-tag-btn { flex: 1; padding: 7px 0; border-radius: 18px; border: 1.5px solid #ddd; background: #fff; font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.2s; color: #888; text-align: center; }
.health-tag-btn.active { color: #fff; border-color: transparent; }
.health-tag-btn.sugar.active { background: #e67e22; }
.health-tag-btn.pressure.active { background: #c0392b; }

/* 健康提醒标签 */
.health-badge { position: absolute; bottom: 6px; padding: 2px 7px; border-radius: 10px; font-size: 10px; font-weight: 700; z-index: 10; line-height: 1.5; color: #fff; pointer-events: none; }
.health-badge.left { left: 6px; }
.health-badge.right { right: 6px; }
.health-badge.avoid { background: #e74c3c; }
.health-badge.limit { background: #f39c12; }

.cart-bar { display: flex; align-items: center; justify-content: space-between; background: #fff; padding: 10px 14px; margin: 8px 12px 0; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
.cart-bar .count { font-size: 14px; font-weight: 600; }
.cart-bar .count span { color: #ff6b35; font-size: 20px; }
.cart-bar .count .mode-label { font-size: 11px; color: #999; margin-left: 2px; }
.cart-bar .btns { display: flex; gap: 8px; }
.btn { border: none; border-radius: 8px; padding: 9px 16px; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
.btn:active { transform: scale(0.96); }
.btn-cart { background: #ff6b35; color: #fff; }
.btn-submit { background: #27ae60; color: #fff; }
.container { padding: 8px 12px; padding-bottom: 100px; }
.section-title { font-size: 16px; font-weight: 700; margin: 18px 0 10px; padding: 8px 12px; border-radius: 8px; color: #fff; display: flex; align-items: center; gap: 8px; letter-spacing: 1px; }
.section-title .icon { font-size: 22px; }
.section-title.meat { background: linear-gradient(135deg, #e74c3c, #c0392b); }
.section-title.veggie { background: linear-gradient(135deg, #27ae60, #1e8449); }
.section-title.soup { background: linear-gradient(135deg, #f39c12, #d68910); }
.section-title.staple { background: linear-gradient(135deg, #8e44ad, #6c3483); }
.menu-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
.menu-item { background: #fff; border-radius: 14px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.06); cursor: pointer; transition: transform 0.15s, box-shadow 0.15s; position: relative; }
.menu-item:active { transform: scale(0.97); box-shadow: 0 1px 4px rgba(0,0,0,0.1); }
.menu-item .img-wrap { width: 100%; height: 130px; position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center; }
.menu-item .img-wrap .emoji-bg { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 68px; z-index: 1; text-shadow: 0 4px 20px rgba(0,0,0,0.12); }
.menu-item .img-wrap .emoji-bg::after { content: ''; position: absolute; inset: 30%; border-radius: 50%; background: radial-gradient(circle, rgba(255,255,255,0.35) 0%, transparent 70%); pointer-events: none; }
.menu-item .img-wrap img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; z-index: 2; display: block; }
.menu-item .img-wrap img.error-img { display: none; }
.menu-item .info { padding: 10px 12px; display: flex; align-items: center; justify-content: center; background: #fff; position: relative; z-index: 3; }
.menu-item .name { font-size: 15px; font-weight: 600; }
.menu-item.in-cart { border: 2px solid #27ae60; box-shadow: 0 2px 14px rgba(39,174,96,0.25); }
.menu-item .qty-badge { position: absolute; right: 8px; top: 8px; background: #27ae60; color: #fff; min-width: 26px; height: 26px; border-radius: 13px; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; padding: 0 6px; z-index: 10; box-shadow: 0 2px 8px rgba(0,0,0,0.25); }

/* Modal */
.modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 200; align-items: flex-end; justify-content: center; }
.modal-overlay.show { display: flex; }
.modal { background: #fff; border-radius: 16px 16px 0 0; width: 100%; max-width: 500px; max-height: 85vh; overflow-y: auto; padding: 20px 16px 24px; animation: slideUp 0.25s ease; position: relative; }
@keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
.modal h3 { font-size: 18px; margin-bottom: 16px; text-align: center; }
.modal .close { position: absolute; right: 16px; top: 18px; width: 30px; height: 30px; border: none; background: #f0f0f0; border-radius: 50%; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
.cart-list { list-style: none; }
.cart-list li { display: flex; align-items: center; padding: 12px 0; border-bottom: 1px solid #eee; gap: 8px; flex-wrap: wrap; }
.cart-list .c-thumb { width: 48px; height: 48px; border-radius: 10px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 30px; position: relative; overflow: hidden; }
.cart-list .c-thumb img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; z-index: 2; border-radius: 10px; }
.cart-list .c-thumb img.error-img { display: none; }
.cart-list .c-name { flex: 1; font-size: 15px; font-weight: 500; min-width: 80px; }
.cart-list .c-note-btn { width: 32px; height: 32px; border: 1px solid #ddd; border-radius: 6px; background: #fff; font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
.cart-list .c-note { width: 100%; margin-left: 56px; font-size: 12px; color: #888; background: #f9f9f9; padding: 4px 8px; border-radius: 6px; }
.cart-list .qty-ctrl { display: flex; align-items: center; flex-shrink: 0; }
.cart-list .qty-ctrl button { width: 32px; height: 32px; border: 1px solid #ddd; background: #f9f9f9; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; border-radius: 6px; }
.cart-list .qty-ctrl .qty { width: 38px; height: 32px; border-top: 1px solid #ddd; border-bottom: 1px solid #ddd; text-align: center; font-size: 15px; font-weight: 600; background: #fafafa; line-height: 32px; }
.cart-summary { margin-top: 16px; padding: 12px 16px; background: #fef9f3; border-radius: 10px; text-align: center; }
.cart-summary .row { font-size: 15px; font-weight: 600; }
.cart-summary .row span { color: #ff6b35; font-size: 20px; }

.note-section { margin-top: 12px; }
.note-section label { font-size: 14px; font-weight: 600; display: block; margin-bottom: 4px; }
.note-section textarea, .note-section input { width: 100%; border: 1px solid #ddd; border-radius: 8px; padding: 10px; font-size: 14px; font-family: inherit; }
.note-section textarea { height: 60px; resize: none; }
.cart-actions { display: flex; gap: 10px; margin-top: 16px; }
.cart-actions .btn { flex: 1; text-align: center; }
.order-content { background: #f9fafb; border-radius: 10px; padding: 14px; font-size: 14px; line-height: 1.8; margin-bottom: 12px; white-space: pre-wrap; }
.order-actions { display: flex; gap: 10px; }
.order-actions .btn { flex: 1; text-align: center; }
.toast { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.8); color: #fff; padding: 12px 24px; border-radius: 8px; font-size: 15px; z-index: 999; animation: fadeInOut 2s ease forwards; pointer-events: none; }
@keyframes fadeInOut { 0% { opacity: 0; } 15% { opacity: 1; } 85% { opacity: 1; } 100% { opacity: 0; } }
.empty-cart { text-align: center; padding: 40px 0; color: #aaa; font-size: 15px; }

/* 做菜人界面 */
.cook-container { padding: 8px 12px; padding-bottom: 100px; }
.order-card { background: #fff; border-radius: 14px; padding: 14px; margin-bottom: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
.order-card .order-hd { display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
.order-card .order-hd .o-time { font-size: 13px; color: #888; }
.order-card .order-hd .o-count { font-size: 14px; font-weight: 600; }
.order-card .order-hd .o-badge { font-size: 11px; padding: 2px 8px; border-radius: 10px; }
.order-card .order-hd .o-badge.normal { background: #ffe0cc; color: #ff6b35; }
.order-card .order-hd .o-badge.diet { background: #d5f5e3; color: #27ae60; }
.order-detail { display: none; margin-top: 12px; border-top: 1px solid #eee; padding-top: 12px; }
.order-detail.show { display: block; }
.order-detail h4 { font-size: 14px; font-weight: 700; margin: 10px 0 6px; color: #555; }
.order-detail .dish-list { font-size: 13px; line-height: 2; }
.order-detail .dish-list .dq { color: #ff6b35; font-weight: 600; margin-right: 6px; }
.order-detail .dish-list .dn { color: #999; font-size: 11px; }
.order-detail .ingr-list { display: flex; flex-wrap: wrap; gap: 4px 8px; font-size: 13px; line-height: 1.8; }
.order-detail .ingr-item { background: #f0f7ff; padding: 2px 8px; border-radius: 6px; white-space: nowrap; }
.order-detail .ingr-item .count { color: #e74c3c; font-weight: 700; }
.order-detail .btn-done { width: 100%; margin-top: 12px; padding: 10px; border-radius: 10px; border: none; background: #27ae60; color: #fff; font-size: 15px; font-weight: 600; cursor: pointer; }
/* 教程区域 */
.tutorial-toggle { display: inline-block; margin-top: 6px; padding: 5px 12px; border: 1px solid #ddd; border-radius: 14px; background: #fafafa; font-size: 12px; color: #666; cursor: pointer; transition: all 0.2s; }
.tutorial-toggle:hover { background: #f0f0f0; color: #333; }
.tutorial-toggle.active { background: #ff6b35; color: #fff; border-color: #ff6b35; }
.tutorial-area { display: none; margin-top: 8px; padding: 10px; background: #fffbeb; border-radius: 8px; font-size: 12px; }
.tutorial-area.show { display: block; }
.tutorial-area ol { margin: 4px 0 0 18px; line-height: 1.8; }
.tutorial-area ol li { color: #555; }
.tutorial-link { display: inline-block; margin-top: 8px; padding: 6px 14px; background: #fb7299; color: #fff; border-radius: 14px; text-decoration: none; font-size: 12px; font-weight: 500; }
.tutorial-link:active { opacity: 0.8; }
/* 备菜/烹饪阶段标签 */
.stage-badge { display: inline-block; padding: 3px 10px; border-radius: 10px; font-size: 11px; font-weight: 700; color: #fff; margin: 8px 0 4px; }
.stage-badge.prep { background: #e67e22; }
.stage-badge.cook { background: #e74c3c; }
.stage-steps { font-size: 12px; color: #555; line-height: 1.8; padding-left: 4px; }
/* 整体备菜清单 */
.prep-summary { background: #fffbf0; border: 1px solid #f0d89c; border-radius: 10px; padding: 12px 14px; margin: 8px 0 12px; }
.prep-summary h4 { font-size: 14px; font-weight: 700; color: #e67e22; margin-bottom: 10px; }
.prep-cat { margin-bottom: 8px; }
.prep-cat .cat-label { display: inline-block; padding: 2px 8px; border-radius: 8px; font-size: 11px; font-weight: 700; color: #fff; margin-right: 6px; vertical-align: middle; }
.prep-cat .cat-label.wash { background: #3498db; }
.prep-cat .cat-label.blanch { background: #1abc9c; }
.prep-cat .cat-label.deodorize { background: #2980b9; }
.prep-cat .cat-label.defrost { background: #2e86c1; }
.prep-cat .cat-label.soak { background: #16a085; }
.prep-cat .cat-label.knead { background: #d4a017; }
.prep-cat .cat-label.ferment { background: #e67e22; }
.prep-cat .cat-label.debone { background: #7f8c8d; }
.prep-cat .cat-label.smash { background: #c0392b; }
.prep-cat .cat-label.peel { background: #d4a017; }
.prep-cat .cat-label.marinate { background: #f39c12; }
.prep-cat .cat-label.chunk { background: #7b5ea7; }
.prep-cat .cat-label.slice { background: #8e44ad; }
.prep-cat .cat-label.shred { background: #9b59b6; }
.prep-cat .cat-label.dice { background: #6c3483; }
.prep-cat .cat-label.section { background: #5b2c6f; }
.prep-cat .cat-label.misc { background: #95a5a6; }
.prep-cat ul.prep-steps { margin: 4px 0 0 8px; padding: 0; list-style: none; font-size: 12px; color: #444; line-height: 1.8; }
.prep-cat ul.prep-steps li { padding: 1px 0; }
.prep-cat ul.prep-steps .prep-src { color: #999; font-size: 11px; margin-left: 2px; }
@media (min-width: 500px) {
  .menu-grid { grid-template-columns: repeat(3, 1fr); }
}
/* 减脂档案卡片 */
.diet-profile { background: #fff; border-radius: 14px; margin: 8px 12px 0; box-shadow: 0 2px 8px rgba(0,0,0,0.06); overflow: hidden; display: none; }
.diet-profile.show { display: block; }
.diet-profile .dp-hd { display: flex; align-items: center; justify-content: space-between; padding: 12px 14px; cursor: pointer; background: linear-gradient(135deg, #e8f5e9, #c8e6c9); }
.diet-profile .dp-hd .dp-title { font-size: 15px; font-weight: 700; color: #2e7d32; display: flex; align-items: center; gap: 6px; }
.diet-profile .dp-hd .dp-toggle { font-size: 12px; color: #666; transition: transform 0.2s; }
.diet-profile .dp-body { padding: 0 14px; max-height: 0; overflow: hidden; transition: max-height 0.3s ease, padding 0.3s ease; }
.diet-profile .dp-body.open { max-height: 600px; padding: 12px 14px 16px; }
.diet-profile .dp-row { display: flex; gap: 8px; margin-bottom: 8px; flex-wrap: wrap; align-items: center; }
.diet-profile .dp-row label { font-size: 13px; font-weight: 600; color: #555; min-width: 40px; }
.diet-profile .dp-row input, .diet-profile .dp-row select { flex: 1; min-width: 60px; border: 1px solid #ddd; border-radius: 8px; padding: 7px 8px; font-size: 13px; font-family: inherit; }
.diet-profile .dp-row .dp-half { flex: 1; min-width: 0; display: flex; align-items: center; gap: 4px; }
.diet-profile .dp-result { background: #f1f8e9; border-radius: 10px; padding: 12px 14px; margin-top: 8px; }
.diet-profile .dp-result .dp-val { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 4px; }
.diet-profile .dp-result .dp-val b { color: #2e7d32; }
.diet-profile .dp-result .dp-macros { display: flex; gap: 8px; margin-top: 8px; }
.diet-profile .dp-result .dp-macro { flex: 1; text-align: center; padding: 8px 4px; border-radius: 8px; font-size: 12px; }
.diet-profile .dp-result .dp-macro.pro { background: #ffebee; color: #c62828; }
.diet-profile .dp-result .dp-macro.carb { background: #fff8e1; color: #f57f17; }
.diet-profile .dp-result .dp-macro.fat { background: #e8f5e9; color: #2e7d32; }
.diet-profile .dp-result .dp-macro .num { font-size: 18px; font-weight: 700; }
.diet-profile .dp-save { width: 100%; margin-top: 8px; padding: 9px; border-radius: 10px; border: none; background: #27ae60; color: #fff; font-size: 14px; font-weight: 600; cursor: pointer; }
.diet-profile .dp-save:active { opacity: 0.8; }
/* 菜品营养标签 */
.menu-item .nutri-tag { position: absolute; left: 6px; top: 6px; background: rgba(39,174,96,0.92); color: #fff; font-size: 10px; padding: 2px 7px; border-radius: 6px; font-weight: 600; z-index: 10; white-space: nowrap; }
/* 购物车营养汇总 */
.cart-nutri { margin-top: 8px; padding: 10px 14px; background: #e8f5e9; border-radius: 10px; font-size: 13px; }
.cart-nutri .cn-row { display: flex; justify-content: space-between; margin-bottom: 3px; }
.cart-nutri .cn-row .cn-label { color: #555; }
.cart-nutri .cn-row .cn-val { font-weight: 700; color: #2e7d32; }
.cart-nutri .cn-bar-wrap { margin-top: 6px; background: #ddd; border-radius: 4px; height: 8px; overflow: hidden; }
.cart-nutri .cn-bar { height: 100%; border-radius: 4px; background: linear-gradient(90deg, #27ae60, #f39c12); transition: width 0.3s; }
.cart-nutri .cn-warn { font-size: 11px; color: #e67e22; margin-top: 2px; }
/* 多角色档案卡片 */
.profile-list { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 8px; }
.profile-card { flex: 1; min-width: 120px; background: #f5f5f5; border-radius: 10px; padding: 8px 10px; position: relative; cursor: default; }
.profile-card .pc-name { font-weight: 700; font-size: 13px; color: #333; }
.profile-card .pc-info { font-size: 11px; color: #888; margin-top: 2px; }
.profile-card .pc-goal { display: inline-block; font-size: 10px; padding: 1px 6px; border-radius: 6px; margin-top: 3px; }
.profile-card .pc-goal.cut { background: #e8f5e9; color: #2e7d32; }
.profile-card .pc-goal.bulk { background: #fff3e0; color: #e65100; }
.profile-card .pc-goal.maintain { background: #e3f2fd; color: #1565c0; }
.profile-card .pc-bar { display: flex; gap: 6px; margin-top: 8px; }
.profile-card .pc-bar-btn { flex: 1; height: 30px; border: none; border-radius: 6px; font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.15s; }
.profile-card .pc-bar-btn:active { transform: scale(0.96); }
.profile-card .pc-bar-edit { background: #e3f2fd; color: #1565c0; }
.profile-card .pc-bar-edit:hover { background: #bbdefb; }
.profile-card .pc-bar-del { background: #ffebee; color: #c62828; }
.profile-card .pc-bar-del:hover { background: #ffcdd2; }
.profile-card .pc-add { width: 100%; min-height: 50px; display: flex; align-items: center; justify-content: center; border: 2px dashed #ccc; border-radius: 10px; cursor: pointer; font-size: 24px; color: #aaa; background: transparent; padding: 0; }
.profile-card .pc-add:hover { border-color: #27ae60; color: #27ae60; }
/* 档案编辑弹窗 */
.profile-modal { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.4); z-index: 2000; display: none; align-items: center; justify-content: center; }
.profile-modal.show { display: flex; }
.profile-modal .pm-inner { background: #fff; border-radius: 16px; padding: 20px; width: 90%; max-width: 340px; }
.profile-modal .pm-inner h3 { margin: 0 0 12px; font-size: 16px; }
.profile-modal .pm-row { display: flex; gap: 8px; margin-bottom: 8px; align-items: center; }
.profile-modal .pm-row label { font-size: 13px; font-weight: 600; color: #555; min-width: 40px; }
.profile-modal .pm-row input, .profile-modal .pm-row select { flex: 1; min-width: 60px; border: 1px solid #ddd; border-radius: 8px; padding: 7px 8px; font-size: 13px; font-family: inherit; }
.profile-modal .pm-row .pm-half { flex: 1; min-width: 0; display: flex; align-items: center; gap: 4px; }
.profile-modal .pm-btns { display: flex; gap: 8px; margin-top: 12px; }
.profile-modal .pm-btns button { flex: 1; padding: 9px; border-radius: 10px; border: none; font-size: 14px; font-weight: 600; cursor: pointer; }
.profile-modal .pm-btns .pm-cancel { background: #eee; color: #333; }
.profile-modal .pm-btns .pm-save { background: #27ae60; color: #fff; }
/* 用餐人选择 */
.diner-select { display: flex; flex-wrap: wrap; gap: 6px; padding: 8px 0; margin-bottom: 4px; }
.diner-select .ds-tag { padding: 4px 10px; border-radius: 14px; font-size: 12px; font-weight: 600; cursor: pointer; border: 1.5px solid #ddd; background: #fff; color: #666; transition: all 0.15s; }
.diner-select .ds-tag.selected { background: #27ae60; border-color: #27ae60; color: #fff; }
.diner-select .ds-none { font-size: 12px; color: #999; }
/* 今日推荐 */
.reco-section { margin: 0 12px 8px; display: none; }
.reco-section.show { display: block; }
.reco-section .reco-hd { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }

}

const PORTION_VIZ = {
  meat:   { s:'≈ 半盘(约140g)',     m:'≈ 1盘(约200g)',   l:'≈ 1盘半(约260g)' },
  veggie: { s:'≈ 小碟(约140g)',     m:'≈ 1碟(约200g)',   l:'≈ 大碟(约260g)' },
  soup:   { s:'≈ 小碗(约210ml)',    m:'≈ 1碗(约300ml)',  l:'≈ 大碗(约390ml)' },
  staple: { s:'≈ 半碗(约140g)',     m:'≈ 1碗(约200g)',   l:'≈ 1碗半(约260g)' },
};
function getVizText(id, portion) {
  const dish = MENU_DIET.find(d => d.id === id);
  const cat = dish ? dish.cat : 'meat';
  return (PORTION_VIZ[cat] || PORTION_VIZ.meat)[portion] || '';
}

function getPortionMultiplier(portion) { return PORTION_FACTORS[portion] || 1.0; }

function getMealSlots() { return MEAL_DISTRIBUTION[mealCount] || MEAL_DISTRIBUTION[3]; }

function getMealTarget(slotIndex) {
  const target = getAvgDietTarget();
  if (!target) return null;
  const slots = getMealSlots();
  if (slotIndex >= slots.length) return null;
  const ratio = slots[slotIndex].ratio;
  return {
    kcal: Math.round(target.targetKcal * ratio),
    protein: Math.round(target.targetProtein * ratio),
  };
}

// ====== 多角色档案管理 ======
function loadDietProfiles() {
  try {
    dietProfiles = JSON.parse(localStorage.getItem(PROFILES_STORAGE_KEY));
  } catch(e) { dietProfiles = null; }
  if (!dietProfiles || !Array.isArray(dietProfiles) || dietProfiles.length === 0) {
    dietProfiles = [ { id: 'default', name: '我', gender: 'male', age: 25, height: 170, weight: 65, goal: 'cut' } ];
    saveDietProfiles();
  }
  dietProfile = dietProfiles[0];
  syncOldProfile();
}

function syncOldProfile() {
  // 迁移旧版单档案数据
  try {
    const old = JSON.parse(localStorage.getItem('diet_profile'));
    if (old) { dietProfiles[0] = Object.assign({ id: 'default', name: '我' }, old, { id: 'default', name: '我' }); saveDietProfiles(); localStorage.removeItem('diet_profile'); }
  } catch(e) {}
}

function saveDietProfiles() {
  localStorage.setItem(PROFILES_STORAGE_KEY, JSON.stringify(dietProfiles));
  dietProfile = dietProfiles.length > 0 ? dietProfiles[0] : null;
}

function renderProfileList() {
  const el = document.getElementById('profileList');
  let html = dietProfiles.map(p => {
    const bmi = calcBMI(p.height, p.weight);
    const goalLabel = { cut: '减脂', bulk: '增肌', maintain: '维持' }[p.goal];
    return `
      <div class="profile-card">
        <div class="pc-name">${escapeHtml(p.name)}</div>
        <div class="pc-info">BMI ${bmi.toFixed(1)} · ${p.weight}kg · ${p.height}cm</div>
        <span class="pc-goal ${p.goal}">${goalLabel}</span>
        <div class="pc-bar">
          <button class="pc-bar-btn pc-bar-edit" onclick="editProfile('${p.id}')">编辑</button>
          <button class="pc-bar-btn pc-bar-del" onclick="deleteProfile('${p.id}')">删除</button>
        </div>
      </div>`;
  }).join('');
  html += '<div class="profile-card pc-add" onclick="addProfile()" title="添加角色">+</div>';
  el.innerHTML = html;
}

function openProfileModal(id, title) {
  document.getElementById('pmTitle').textContent = title;
  document.getElementById('pmId').value = id || '';
  if (id) {
    const p = dietProfiles.find(x => x.id === id);
    if (p) {
      document.getElementById('pmName').value = p.name;
      document.getElementById('pmGender').value = p.gender;
      document.getElementById('pmAge').value = p.age;
      document.getElementById('pmHeight').value = p.height;
      document.getElementById('pmWeight').value = p.weight;
      document.getElementById('pmGoal').value = p.goal;
    }
  } else {
    document.getElementById('pmName').value = '';
    document.getElementById('pmGender').value = 'male';
    document.getElementById('pmAge').value = '';
    document.getElementById('pmHeight').value = '';
    document.getElementById('pmWeight').value = '';
    document.getElementById('pmGoal').value = 'cut';
  }
  document.getElementById('profileModal').classList.add('show');
}

function closeProfileModal() {
  document.getElementById('profileModal').classList.remove('show');
}

function addProfile() { openProfileModal(null, '添加角色'); }
function editProfile(id) { openProfileModal(id, '编辑角色'); }

function deleteProfile(id) {
  if (dietProfiles.length <= 1) { showToast('至少保留一个角色'); return; }
  if (!confirm('确定删除这个角色吗？该角色的用餐人记录将被清除。')) return;

  // 核心操作：过滤 + 保存原子执行
  try {
    dietProfiles = dietProfiles.filter(p => String(p.id) !== String(id));
    if (dietProfiles.length === 0) {
      dietProfiles = [{ id: 'default', name: '我', gender: 'male', age: 25, height: 170, weight: 65, goal: 'cut' }];
    }
    saveDietProfiles();
    showToast('已删除');
  } catch(e) {
    showToast('操作失败，请重试');
    return;
  }

  // 第一优先级：强制刷新核心 UI（requestAnimationFrame 确保 DOM 更新）
  updateDinerSelect();
  requestAnimationFrame(() => {
    renderProfileList();
    renderDinerSelectBar();
  });

  // 次要渲染：独立 try-catch，失败不影响核心 UI
  try {
    if (currentMode === 'diet') {
      showDietResult();
      renderRecommendations();
    }
    updateCartBar();
  } catch(e) {}
}

function saveProfileEdit() {
  const name = document.getElementById('pmName').value.trim();
  const gender = document.getElementById('pmGender').value;
  const age = parseInt(document.getElementById('pmAge').value) || 0;
  const height = parseFloat(document.getElementById('pmHeight').value) || 0;
  const weight = parseFloat(document.getElementById('pmWeight').value) || 0;
  const goal = document.getElementById('pmGoal').value;
  const id = document.getElementById('pmId').value;

  if (!name) { showToast('请填写姓名'); return; }
  if (!age || !height || !weight) { showToast('请填写完整的身体数据'); return; }

  const profile = { id: id || ('p_' + Date.now()), name, gender, age, height, weight, goal };
  if (id) {
    const idx = dietProfiles.findIndex(p => p.id === id);
    if (idx >= 0) dietProfiles[idx] = profile;
  } else {
    dietProfiles.push(profile);
  }
  saveDietProfiles();
  closeProfileModal();
  updateDinerSelect();
  renderAll();
}

function showDietResult() {
  if (dietProfiles.length === 0) return;
  // 展示第一个角色的详细计算结果
  const p = dietProfiles[0];
  const bmi = calcBMI(p.height, p.weight);
  let bmiLabel;
  if (bmi < 18.5) bmiLabel = '偏瘦';
  else if (bmi < 24) bmiLabel = '正常';
  else if (bmi < 28) bmiLabel = '超重';
  else bmiLabel = '肥胖';

  const bmr = Math.round(calcBMR(p.gender, p.weight, p.height, p.age));
  let tdee = Math.round(bmr * 1.2);
  let targetKcal;
  if (p.goal === 'cut') targetKcal = tdee - 500;
  else if (p.goal === 'bulk') targetKcal = tdee + 300;
  else targetKcal = tdee;
  if (targetKcal < 1200) targetKcal = 1200;

  const proteinG = Math.round(p.weight * 2.0);
  const fatG = Math.round(targetKcal * 0.25 / 9);
  const carbG = Math.round((targetKcal - proteinG * 4 - fatG * 9) / 4);

  const resultEl = document.getElementById('dpResult');
  resultEl.style.display = 'block';
  resultEl.innerHTML = `
    <div style="font-size:12px;color:#888;margin-bottom:6px;">以「${escapeHtml(p.name)}」的身体数据为参考</div>
    <div class="dp-val"><span>BMI</span><b>${bmi.toFixed(1)} (${bmiLabel})</b></div>
    <div class="dp-val"><span>基础代谢 BMR</span><b>${bmr} kcal</b></div>
    <div class="dp-val"><span>每日推荐摄入</span><b>${targetKcal} kcal</b></div>
    <div class="dp-macros">
      <div class="dp-macro pro"><div class="num">${proteinG}g</div>蛋白质</div>
      <div class="dp-macro carb"><div class="num">${carbG}g</div>碳水</div>
      <div class="dp-macro fat"><div class="num">${fatG}g</div>脂肪</div>
    </div>`;
}

function updateDinerSelect() {
  // 清理无效 ID + 首次初始化
  const validIds = new Set(dietProfiles.filter(p => p.goal !== 'maintain').map(p => p.id));
  selectedDiners = selectedDiners.filter(id => validIds.has(id));
  if (selectedDiners.length === 0) {
    selectedDiners = Array.from(validIds);
  }
}

function toggleDiner(id) {
  const idx = selectedDiners.indexOf(id);
  if (idx >= 0) {
    if (selectedDiners.length <= 1) { showToast('至少选一位用餐人'); return; }
    selectedDiners.splice(idx, 1);
  } else {
    selectedDiners.push(id);
  }
}

  const bar = document.getElementById('dinerSelectBar');
  bar.classList.toggle('show', currentMode === 'diet');
  if (currentMode !== 'diet') return;

function getAvgDietTarget() {
  // 计算所选用餐人的平均目标
  if (selectedDiners.length === 0) return null;
  const profiles = dietProfiles.filter(p => selectedDiners.includes(p.id));
  if (profiles.length === 0) return null;
  let totalKcal = 0, totalProtein = 0;
  profiles.forEach(p => {
    const bmr = Math.round(calcBMR(p.gender, p.weight, p.height, p.age));
    let tdee = Math.round(bmr * 1.2);
    let target;
    if (p.goal === 'cut') target = tdee - 500;
    else if (p.goal === 'bulk') target = tdee + 300;
    else target = tdee;
    if (target < 1200) target = 1200;
    totalKcal += target;
    totalProtein += Math.round(p.weight * 2.0);
  });
  return {
    targetKcal: Math.round(totalKcal / profiles.length),
    targetProtein: Math.round(totalProtein / profiles.length)
  };
}

// ====== 今日推荐引擎（分餐版） ======
// 正餐模板：荤+素+主食，3道菜
const MAIN_COMBO_TEMPLATES = [
  ['d1','d5','d12'], ['d1','d6','d13'], ['d1','d7','d14'], ['d1','d8','d15'],
  ['d2','d5','d13'], ['d2','d6','d12'], ['d2','d7','d15'], ['d2','d8','d14'],
  ['d3','d5','d14'], ['d3','d6','d15'], ['d3','d7','d12'], ['d3','d8','d13'],
  ['d4','d5','d15'], ['d4','d6','d14'], ['d4','d7','d13'], ['d4','d8','d12'],
  ['d1','d3','d5','d12'], ['d2','d4','d6','d13'], ['d1','d5','d9','d12'], ['d2','d6','d10','d13'],
  ['d3','d7','d11','d14'], ['d4','d8','d9','d15'], ['d1','d6','d11','d14'], ['d2','d5','d10','d15'],
];
// 轻食/早餐模板：2道菜，主食+汤/蛋/素
const LIGHT_COMBO_TEMPLATES = [
  ['d12','d9'], ['d13','d11'], ['d14','d9'], ['d15','d11'],
  ['d12','d5'], ['d13','d6'], ['d14','d7'], ['d15','d8'],
  ['d12','d11'], ['d13','d9'], ['d14','d11'], ['d15','d9'],
];
// 加餐模板：1-2道轻量
const SNACK_COMBO_TEMPLATES = [
  ['d5'], ['d6'], ['d9'], ['d11'],
  ['d5','d9'], ['d6','d11'], ['d7','d9'], ['d8','d11'],
  ['d12'], ['d14'], ['d15'],
];

function getComboTemplatesForSlot(slotIndex) {
  const slots = getMealSlots();
  const slot = slots[slotIndex];
  if (!slot) return MAIN_COMBO_TEMPLATES;
  if (slot.light) return LIGHT_COMBO_TEMPLATES;
  if (slot.name.includes('加餐')) return SNACK_COMBO_TEMPLATES;
  return MAIN_COMBO_TEMPLATES;
}

function makeComboKey(combo) { return combo.slice().sort().join(','); }

function calcComboStats(combo) {
  let kcal = 0, protein = 0;
  combo.forEach(id => {
    const nu = NUTRITION[id];
    if (nu) { kcal += nu.kcal; protein += nu.protein; }
  });
  return { kcal, protein };
}

function scoreCombo(comboStats, target) {
  if (!target) return 0;
  const kcalDist = Math.abs(comboStats.kcal - target.kcal);
  const kcalScore = Math.max(0, 1 - kcalDist / Math.max(target.kcal, 1));
  const proteinScore = Math.min(1, comboStats.protein / Math.max(target.protein, 0.1));
  return kcalScore * 0.6 + proteinScore * 0.4;
}

function getRecommendation(slotIndex) {
  const mealTarget = getMealTarget(slotIndex);
  const templates = getComboTemplatesForSlot(slotIndex);
  const available = templates.filter(c => !recoHistory.has(makeComboKey(c)));
  const candidates = available.length >= 4 ? available : templates;
  const scale = getDinerScale();

  return candidates
    .map(combo => {
      const stats = calcComboStats(combo);
      let scaledKcal = 0, scaledProtein = 0;
      combo.forEach(id => {
        const nu = NUTRITION[id];
        if (nu) {
          const factor = isStapleDish(id) ? scale.staple : scale.general;
          scaledKcal += Math.round(nu.kcal * factor);
          scaledProtein += Math.round(nu.protein * factor);
        }
      });
      return { combo, key: makeComboKey(combo), kcal: scaledKcal, protein: scaledProtein, score: scoreCombo(stats, mealTarget) };
    })
    .sort((a, b) => b.score - a.score)
    .slice(0, 4)
    .map(r => ({ combo: r.combo, key: r.key, kcal: r.kcal, protein: r.protein }));
}

function renderMealTabs() {
  const slots = getMealSlots();
  const tabs = document.getElementById('mealTabs');
  if (currentMealSlot >= slots.length) currentMealSlot = 0; // 回退到午餐
  const target = getAvgDietTarget();
  const totalKcal = target ? target.targetKcal : 2000;
  tabs.innerHTML = slots.map((s, i) => {
    const mealKcal = Math.round(totalKcal * s.ratio);
    const active = i === currentMealSlot ? ' active' : '';
    return `<span class="mt-tab${active}" onclick="switchMealSlot(${i})">${s.name}<br><span class="mt-sub">约${mealKcal}kcal</span></span>`;
  }).join('');
}

function renderRecommendations() {
  const section = document.getElementById('recoSection');
  section.classList.toggle('show', currentMode === 'diet');
  if (currentMode !== 'diet') return;
  renderMealTabs();
  const mealTarget = getMealTarget(currentMealSlot);
  const slot = getMealSlots()[currentMealSlot];
  const scale = getDinerScale();
  const dinerLabel = scale.count > 1 ? ` · 适合${scale.count}人` : '';
  const recos = getRecommendation(currentMealSlot);
  const menu = MENU_DIET;
  const scroll = document.getElementById('recoScroll');
  if (selectedDiners.length === 0) {
    scroll.innerHTML = '<div style="text-align:center;padding:20px;color:#aaa;font-size:13px;">请先在上方选择用餐人</div>';
    return;
  }
  scroll.innerHTML = recos.map(r => {
    const names = r.combo.map(id => {
      const dish = menu.find(d => d.id === id);
      return dish ? (dish.emoji + dish.name) : id;
    }).join(' + ');
    return `
    <div class="reco-card">
      <div class="rc-meal-tag">${slot ? slot.name : '正餐'}${dinerLabel}</div>
      <div class="rc-dishes">${names}</div>
      <div class="rc-stats">约 <b>${r.kcal}</b> kcal · 蛋白质 <b>${r.protein}</b>g</div>
      <button class="rc-btn" onclick="addComboToCart('${r.key}')">一键加入购物车</button>
    </div>`;
  }).join('');
  recos.forEach(r => recoHistory.add(r.key));
}

function addComboToCart(key) {
  const allTemplates = [...MAIN_COMBO_TEMPLATES, ...LIGHT_COMBO_TEMPLATES, ...SNACK_COMBO_TEMPLATES];
  const entry = allTemplates.find(t => makeComboKey(t) === key);
  if (!entry) return;
  const scale = getDinerScale();
  entry.forEach(id => {
    if (!cartDiet[id]) cartDiet[id] = 0;
    const factor = isStapleDish(id) ? scale.staple : scale.general;
    cartDiet[id] += Math.max(1, Math.round(factor));
  });
  renderAll();
  updateCartBar();
  openCart();
}

function calcBMI(heightCm, weightKg) {
  const m = heightCm / 100;
  return weightKg / (m * m);
}

function calcBMR(gender, weight, height, age) {
  if (gender === 'male') {
    return 10 * weight + 6.25 * height - 5 * age + 5;
  } else {
    return 10 * weight + 6.25 * height - 5 * age - 161;
  }
}

function renderMenuItem(m) {
  const cart = getCart();
  const inCart = cart[m.id];
  let healthTags = '';
  if (m.health) {
    const labels = [
      { key: 'diabetes', css: 'left', short: '糖' },
      { key: 'hypertension', css: 'right', short: '压' }
    ];
    for (const l of labels) {
      if (currentMode === 'normal' && healthFilters[l.key]) {
        const tag = m.health[l.key];
        if (tag === 'avoid') {
          healthTags += `<div class="health-badge avoid ${l.css}">忌口·${l.short}</div>`;
        } else if (tag === 'limit') {
          healthTags += `<div class="health-badge limit ${l.css}">少吃·${l.short}</div>`;
        }
      }
    }
  }
  // 减脂模式营养标签（根据份量动态计算）
  let nutriTag = '';
  let portionHtml = '';
  if (currentMode === 'diet') {
    const nu = NUTRITION[m.id];
    const portion = cartPortions[m.id] || 'm';
    const mul = getPortionMultiplier(portion);
    if (nu) {
      const adjKcal = Math.round(nu.kcal * mul);
      const adjProtein = Math.round(nu.protein * mul);
      nutriTag = `<div class="nutri-tag">约${adjKcal}kcal | 蛋白质${adjProtein}g</div>`;
    }
    const selClass = (p) => (cartPortions[m.id] || 'm') === p ? ' pt-sel' : '';
    const vizText = getVizText(m.id, portion);
    portionHtml = `
      <div class="portion-ctrl" onclick="event.stopPropagation()">
        <div class="pt-btn${selClass('s')}" onclick="setPortion('${m.id}','s')" title="${getVizText(m.id,'s')}">小</div>
        <div class="pt-btn${selClass('m')}" onclick="setPortion('${m.id}','m')" title="${getVizText(m.id,'m')}">中</div>
        <div class="pt-btn${selClass('l')}" onclick="setPortion('${m.id}','l')" title="${getVizText(m.id,'l')}">大</div>
      </div>
      <div class="pt-viz">${vizText}</div>`;
  }
  return `
    <div class="menu-item ${inCart ? 'in-cart' : ''}" onclick="addToCart('${m.id}')">
      ${inCart ? `<div class="qty-badge">${inCart}</div>` : ''}
      ${nutriTag}
      ${healthTags}
      <div class="img-wrap" style="background:${m.gradient}">
        <div class="emoji-bg">${m.emoji}</div>
        ${m.img ? `<img src="${m.img}" alt="${m.name}" loading="lazy" onerror="this.classList.add('error-img')">` : ''}
      </div>
      <div class="info">
        <div class="name">${m.name}</div>
        ${portionHtml}
      </div>
    </div>`;
}

function removeFromCart(id) {

  updateCartBar();

function escapeHtml(str) {

  div.textContent = str;

function renderCartNutri(items) {
  if (!dietProfile || dietProfiles.length === 0) return '';
  const target = getAvgDietTarget();
  if (!target) return '';
  let totalKcal = 0, totalProtein = 0;
  items.forEach(i => {
    const nu = NUTRITION[i.id];
    const portion = cartPortions[i.id] || 'm';
    const mul = getPortionMultiplier(portion);
    if (nu) { totalKcal += Math.round(nu.kcal * mul * i.qty); totalProtein += Math.round(nu.protein * mul * i.qty); }
  });
  if (totalKcal === 0) return '';
  const pct = Math.min(100, Math.round(totalKcal / target.targetKcal * 100));
  let warn = '';
  if (pct > 90) warn = '<div class="cn-warn">热量接近每日上限，建议适当调整</div>';
  const dinerNames = dietProfiles.filter(p => selectedDiners.includes(p.id)).map(p => p.name).join('、');
  return `
    <div class="cart-nutri">
      <div class="cn-row"><span class="cn-label">热量合计</span><span class="cn-val">${totalKcal} kcal</span></div>
      <div class="cn-row"><span class="cn-label">蛋白质合计</span><span class="cn-val">${totalProtein} g</span></div>
      <div class="cn-row"><span class="cn-label">每日目标（${dinerNames ? '均' : ''}）</span><span class="cn-val">${target.targetKcal} kcal</span></div>
      <div class="cn-bar-wrap"><div class="cn-bar" style="width:${pct}%"></div></div>
      <div class="cn-row" style="font-size:11px;color:#888;margin-top:2px;"><span>已选占目标 ${pct}%</span></div>
      ${warn}
    </div>`;
}

  }
}

async function confirmMealType(mealType) {
  document.getElementById('mealTypeModal').classList.remove('show');
  if (!pendingOrderData) return;

  const note = document.getElementById('orderNote').value.trim();
  const now = new Date();
  const ts = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
  const modeLabel = currentMode === 'normal' ? '日常' : '减脂';
  const mealLabels = { breakfast: '早餐', lunch: '午餐', dinner: '晚餐' };
  const mealLabel = currentMode === 'normal' ? mealLabels[mealType] : mealType;
  const catNames = { meat: '荤菜', veggie: '素菜', soup: '汤品', staple: '主食' };
  const items = pendingOrderData.items;

  let text = `点菜单 [${modeLabel}] [${mealLabel}]  ${ts}\n`;
  if (currentMode === 'diet') {
    const dinerNames = dietProfiles.filter(p => selectedDiners.includes(p.id)).map(p => p.name).join('、');
    if (dinerNames) text += `用餐人：${dinerNames}（${selectedDiners.length}人）\n`;
  }
  text += `${'─'.repeat(28)}\n`;
  ['meat', 'veggie', 'soup', 'staple'].forEach(cat => {
    const catItems = items.filter(i => i.cat === cat);
    if (catItems.length > 0) {
      text += `【${catNames[cat]}】\n`;
      catItems.forEach((i, idx) => {
        let line = `  ${idx + 1}. ${i.emoji} ${i.name}  ×${i.qty}`;
        if (i.note) line += `  [${i.note}]`;
        text += line + '\n';
      });
      text += '\n';
    }
  });
  text += `${'─'.repeat(28)}\n`;
  text += `合计：${items.reduce((s, i) => s + i.qty, 0)} 道菜\n`;
  if (note) text += `\n备注：${note}`;

  const order = {
    id: Date.now(),
    time: ts,
    mode: currentMode,
    modeLabel: modeLabel,
    mealType: mealType,
    dinerCount: currentMode === 'diet' ? selectedDiners.length : 0,
    items: items,
    globalNote: note,
    text: text,
    done: false,
  };
  await saveOrder(order);
  pendingOrderData = null;

  document.getElementById('orderContent').textContent = text;
  document.getElementById('orderModal').classList.add('show');

  setCart({});
  cartNotes = {};
  renderAll();
  updateCartBar();
  await renderCookPage();
}

async function saveOrder(order) {
  const { error } = await supabase.from('orders').insert(order);
  if (error) console.error('Save error:', error);
}

async function loadOrders() {
  const { data, error } = await supabase.from('orders').select('*').order('id', { ascending: false });
  if (error) { console.error('Load error:', error); return []; }
  return data || [];
}

function closeOrder() { document.getElementById('orderModal').classList.remove('show'); }

function copyOrder() {
  const text = document.getElementById('orderContent').textContent;
  if (navigator.clipboard) {
    navigator.clipboard.writeText(text).then(() => showToast('已复制，可粘贴发给家人'));
  } else {
    const ta = document.createElement('textarea');
    ta.value = text; ta.style.position = 'fixed'; ta.style.opacity = '0';
    document.body.appendChild(ta); ta.select();
    document.execCommand('copy'); document.body.removeChild(ta);
    showToast('已复制，可粘贴发给家人');
  }
}

// ====== 做菜人界面 ======
function categorizePrepStep(step) {
  if (/焯水|焯一下|飞水|氽烫/.test(step)) return { cat: 'blanch', label: '焯水' };
  if (/去腥|去血水|浸泡.*血水|泡.*血水/.test(step)) return { cat: 'deodorize', label: '去腥/去血水' };
  if (/解冻|提前拿出|化冻/.test(step)) return { cat: 'defrost', label: '解冻' };
  if (/泡发|泡软|泡开|提前浸泡|冷水泡发/.test(step)) return { cat: 'soak', label: '泡发' };
  if (/去骨|剔骨|剔去骨头/.test(step)) return { cat: 'debone', label: '去骨/剔骨' };
  if (/和面|揉面|揉成面团|揉.*面团/.test(step)) return { cat: 'knead', label: '和面/揉面' };
  if (/发酵|醒发|发至.*倍大|发至.*倍/.test(step)) return { cat: 'ferment', label: '发酵/醒发' };
  if (/醒面/.test(step)) return { cat: 'ferment', label: '醒面' };
  if (/腌/.test(step)) return { cat: 'marinate', label: '腌制' };
  if (/拍扁|拍碎|拍松/.test(step)) return { cat: 'smash', label: '拍扁/拍碎' };
  if (/去皮/.test(step)) return { cat: 'peel', label: '去皮处理' };
  if (/切丁|切末|剁碎|切碎|切小丁|切小块/.test(step)) return { cat: 'dice', label: '切丁/切末/剁碎' };
  if (/切丝|切细丝/.test(step)) return { cat: 'shred', label: '切丝' };
  if (/切片|切薄片/.test(step)) return { cat: 'slice', label: '切片' };
  if (/切滚刀|菱形块/.test(step)) return { cat: 'section', label: '切段/滚刀' };
  if (/切段|切斜段/.test(step)) return { cat: 'section', label: '切段/滚刀' };
  if (/切块/.test(step)) return { cat: 'chunk', label: '切块' };
  if (/淘洗|洗|清洗|洗净|去鳞|去内脏|去鳃|沥干/.test(step)) return { cat: 'wash', label: '清洗/沥干' };
  return { cat: 'misc', label: '其他处理' };
}

function extractPrepIngredient(step) {
  const m = step.match(/^([^，,]+)/);
  return m ? m[1] : step;
}

function generatePrepSummary(order) {
  const groups = {};
  const catOrders = ['defrost','soak','deodorize','knead','ferment','blanch','debone','marinate','smash','peel','chunk','slice','shred','dice','section','wash','misc'];
  const catNames = { defrost: '解冻', soak: '泡发', deodorize: '去腥/去血水', knead: '和面/揉面', ferment: '发酵/醒发', blanch: '焯水', debone: '去骨/剔骨', marinate: '腌制', smash: '拍扁/拍碎', peel: '去皮处理', chunk: '切块', slice: '切片', shred: '切丝', dice: '切丁/切末/剁碎', section: '切段/滚刀', wash: '清洗/沥干', misc: '其他处理' };

  order.items.forEach(item => {
    const t = TUTORIALS[item.id];
    if (!t || !t.prep) return;
    t.prep.forEach(step => {
      const { cat } = categorizePrepStep(step);
      if (!groups[cat]) groups[cat] = [];
      const key = `${item.id}|${step}`;
      if (!groups[cat].find(x => x.key === key)) {
        groups[cat].push({ key, step, dish: `${item.emoji} ${item.name}` });
      }
    });
  });

  if (Object.keys(groups).length === 0) return '';

  let html = '<h4>整体备菜清单（一次性全处理完再开火）</h4>';
  catOrders.forEach(cat => {
    if (!groups[cat] || groups[cat].length === 0) return;
    html += `<div class="prep-cat"><span class="cat-label ${cat}">${catNames[cat]}</span>`;
    html += `<ul class="prep-steps">`;
    groups[cat].forEach(({ step, dish }) => {
      html += `<li>${escapeHtml(step)}<span class="prep-src">（${escapeHtml(dish)}）</span></li>`;
    });
    html += `</ul></div>`;
  });
  return html;
}

// 合并订单菜品（同id合并qty，备注拼接）
function mergeOrderItems(items) {
  const map = {};
  items.forEach(i => {
    if (!map[i.id]) {
      map[i.id] = { ...i, qty: i.qty, notes: i.note ? [i.note] : [] };
    } else {
      map[i.id].qty += i.qty;
      if (i.note) map[i.id].notes.push(i.note);
    }
  });
  return Object.values(map).map(m => {
    const uniqueNotes = [...new Set(m.notes)];
    return { ...m, note: uniqueNotes.join('；'), notes: undefined };
  });
}

async function renderCookPage() {
  const orders = await loadOrders();
  const pending = orders.filter(o => !o.done);
  const container = document.getElementById('cookContainer');

  if (pending.length === 0) {
    container.innerHTML = '<div class="empty-cart">暂无待处理订单</div>';
    return;
  }

  const mealLabels = { breakfast: '早餐', lunch: '午餐', dinner: '晚餐' };
  const mealEmojis = { breakfast: '🌅', lunch: '☀️', dinner: '🌙' };
  const mealOrder = ['breakfast', 'lunch', 'dinner'];
  const grouped = { breakfast: [], lunch: [], dinner: [] };

  pending.forEach(o => {
    const mt = o.mealType || 'lunch';
    if (grouped[mt]) grouped[mt].push(o);
  });

  let html = '';
  mealOrder.forEach(mt => {
    const ordersInGroup = grouped[mt];
    html += `<div class="cook-meal-section">`;
    html += `<div class="cms-header ${mt}">${mealEmojis[mt]} ${mealLabels[mt]}（${ordersInGroup.length}单）</div>`;
    if (ordersInGroup.length === 0) {
      html += `<div class="cms-empty">暂无订单</div>`;
    } else {
      ordersInGroup.forEach(order => {
        const mergedItems = mergeOrderItems(order.items);
        const totalQty = mergedItems.reduce((s, i) => s + i.qty, 0);
        // 用合并后的 items 计算食材汇总
        const mergedOrder = { ...order, items: mergedItems };
        const prepSummary = generatePrepSummary(mergedOrder);
        html += `
    <div class="order-card">
      <div class="order-hd" onclick="toggleOrderDetail(${order.id})">
        <div>
          <span class="o-meal-tag ${mt}">${mealLabels[mt]}</span>
          <span class="o-badge ${order.mode}">${order.modeLabel}</span>
          ${order.dinerCount ? `<span class="o-diner-count">${order.dinerCount}人</span>` : ''}
          <span class="o-count">${mergedItems.length} 种 · 共${totalQty}道</span>
        </div>
        <div class="order-hd-btns">
          <span class="o-time">${order.time}</span>
          <button class="btn-del-order" onclick="event.stopPropagation();deleteOrder(${order.id})">删除订单</button>
        </div>
      </div>
      <div class="order-detail" id="orderDetail${order.id}">
        <h4>订单概览</h4>
        <div class="dish-list">
          ${mergedItems.map(i => {
            const noteStr = i.note ? ` <span class="dn">[${escapeHtml(i.note)}]</span>` : '';
            return `<div class="dish-merged"><span class="dq">×${i.qty}</span>${i.emoji} ${i.name}${noteStr}<button class="btn-remove-dish" onclick="event.stopPropagation();removeDishFromOrder(${order.id},'${i.id}')">移除</button></div>`;
          }).join('')}
        </div>
        ${order.globalNote ? `<div style="margin-top:6px;font-size:13px;color:#888;">全局备注：${escapeHtml(order.globalNote)}</div>` : ''}
        ${prepSummary ? `<div class="prep-summary">${prepSummary}</div>` : ''}
        <h4>食材汇总</h4>
        <div class="ingr-list">${renderMergedIngredients(mergedOrder)}</div>
        <h4>各道菜教程</h4>
        ${mergedItems.map((i, di) => {
          const t = TUTORIALS[i.id];
          if (!t) return '';
          const hasCook = t.cook && t.cook.length > 0;
          return `
            <div style="margin-bottom:8px;">
              <button class="tutorial-toggle" onclick="toggleTutorial(${order.id},${di})">${i.emoji} ${i.name} ×${i.qty}</button>
              <div class="tutorial-area" id="tutorial_${order.id}_${di}">
                ${hasCook ? `<span class="stage-badge cook">烹 饪</span><div class="stage-steps"><ol style="margin:0 0 0 18px;">${t.cook.map(s => `<li>${s}</li>`).join('')}</ol></div>` : ''}
                <a href="${t.video}" target="_blank" rel="noopener" class="tutorial-link">B站搜：${i.name} 家常做法</a>
              </div>
            </div>`;
        }).join('')}
        <button class="btn-done" onclick="markOrderDone(${order.id})">标记为已完成</button>
      </div>
    </div>`;
      });
    }
    html += `</div>`;
  });
  container.innerHTML = html;
}

function toggleOrderDetail(idx) {
  const el = document.getElementById('orderDetail' + idx);
  if (el) el.classList.toggle('show');
}

function toggleTutorial(orderIdx, dishIdx) {
  const area = document.getElementById('tutorial_' + orderIdx + '_' + dishIdx);
  const btn = area.previousElementSibling;
  area.classList.toggle('show');
  btn.classList.toggle('active');
}

function renderMergedIngredients(order) {
  // 合并同类食材
  const merge = {};
  order.items.forEach(item => {
    const ingrStr = INGREDIENTS[item.id] || '';
    if (!ingrStr) return;
    const parts = ingrStr.split('、');
    parts.forEach(p => {
      const m = p.match(/^(.+?)(\d+)(g|ml|个|根|颗|条|盒|罐|碗|把|张|杯)$/);
      if (m) {
        const key = m[1];
        const num = parseFloat(m[2]) * item.qty;
        const unit = m[3];
        merge[key] = merge[key] || { num: 0, unit: unit };
        merge[key].num += num;
      } else {
        // 无数量的调料类，简单计数
        merge[p] = merge[p] || { num: 0, unit: '次' };
        merge[p].num += item.qty;
      }
    });
  });
  return Object.entries(merge).map(([name, val]) => {
    const showCount = val.num > 1 && val.unit !== '次';
    const display = showCount ? `${Math.round(val.num * 10) / 10}${val.unit}` : (val.unit === '次' ? `×${val.num}` : `(${val.unit})`);
    return `<span class="ingr-item">${name}${val.unit === '次' ? '' : ''} <span class="count">${display}</span></span>`;
  }).join('');
}

async function markOrderDone(orderId) {
  if (!confirm('确定标记此订单为已完成？')) return;
  const { error } = await supabase.from('orders').update({ done: true }).eq('id', orderId);
  if (error) { console.error('Update error:', error); return; }
  await renderCookPage();
  showToast('已标记为已完成');
}

async function deleteOrder(orderId) {
  if (!confirm('确定删除整个订单？此操作不可恢复。')) return;
  const { error } = await supabase.from('orders').delete().eq('id', orderId);
  if (error) { console.error('Delete error:', error); return; }
  await renderCookPage();
  showToast('订单已删除');
}

async function removeDishFromOrder(orderId, dishId) {
  const { data: orders, error: loadErr } = await supabase.from('orders').select('*');
  if (loadErr) return;
  const order = orders.find(o => o.id === orderId);
  if (!order) return;
  const idx = order.items.findIndex(i => i.id === dishId);
  if (idx < 0) return;
  if (!confirm('确定从订单中移除「' + order.items[idx].emoji + ' ' + order.items[idx].name + '」？')) return;
  order.items.splice(idx, 1);
  if (order.items.length === 0) {
    await supabase.from('orders').delete().eq('id', orderId);
    showToast('菜品已全部移除，订单已删除');
  } else {
    await supabase.from('orders').update({ items: order.items }).eq('id', orderId);
    showToast('菜品已移除');
  }
  await renderCookPage();
}

function showToast(msg) {
  const t = document.createElement('div');
  t.className = 'toast'; t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2100);
}
